<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5f0e8">
  <title>Twin Roll</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/board.css">
  <link rel="stylesheet" href="/static/css/ui.css">
</head>
<body>

<!-- ══ HOME ════════════════════════════════════════════ -->
<div id="homeScreen" class="screen active">
  <div class="logo">
    <div class="dice-anim">🎲🎲</div>
    <h1>Twin Roll</h1>
    <div class="sub">Ludo, Doubled</div>
    <div id="appVersion" style="font-size:0.75rem;color:var(--muted);margin-top:8px;font-weight:600;"></div>
  </div>
  <div class="home-btns">
    <button class="btn btn-primary" onclick="UI.showScreen('createScreen')">Create Room</button>
    <button class="btn btn-secondary" onclick="UI.showScreen('joinScreen')">Join with Code</button>
    <button class="btn btn-secondary" onclick="UI.showScreen('matchScreen')">Quick Match</button>
  </div>
</div>

<!-- ══ CREATE ROOM ══════════════════════════════════════ -->
<div id="createScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="UI.showScreen('homeScreen')">← Back</button>
    <h2>Create Room</h2>
  </div>
  <div class="form-card">
    <div class="form-row">
      <label>Your Name</label>
      <input type="text" id="createName" placeholder="Enter your name" maxlength="20">
    </div>
    <div class="form-row">
      <label>Players</label>
      <div class="seg" id="createPlayersSeg">
        <button class="seg-btn active" data-val="2">2 Players</button>
        <button class="seg-btn" data-val="4">4 Players</button>
      </div>
    </div>
    <div class="form-row">
      <label>Dice Mode</label>
      <div class="seg" id="createDiceSeg">
        <button class="seg-btn active" data-val="false">🎲 Normal</button>
        <button class="seg-btn" data-val="true">🎲🎲 Twin</button>
      </div>
    </div>
    <div class="form-row">
      <div class="toggle-row">
        <div>
          <div style="font-weight:600">Public Room</div>
          <div style="font-size:0.8rem;color:var(--muted)">Visible in matchmaking</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="createPublic">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <button class="btn btn-primary" onclick="Game.createRoom()">Create & Wait</button>
  </div>
</div>

<!-- ══ JOIN ROOM ════════════════════════════════════════ -->
<div id="joinScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="UI.showScreen('homeScreen')">← Back</button>
    <h2>Join Room</h2>
  </div>
  <div class="form-card">
    <div class="form-row">
      <label>Your Name</label>
      <input type="text" id="joinName" placeholder="Enter your name" maxlength="20">
    </div>
    <div class="form-row">
      <label>Room Code</label>
      <input type="text" id="joinCode" placeholder="ABC123" maxlength="6"
        style="text-transform:uppercase;letter-spacing:0.2em;font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800">
    </div>
    <button class="btn btn-primary" onclick="Game.joinRoom()">Join Room</button>
  </div>
</div>

<!-- ══ QUICK MATCH ══════════════════════════════════════ -->
<div id="matchScreen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="UI.showScreen('homeScreen')">← Back</button>
    <h2>Quick Match</h2>
  </div>
  <div class="form-card">
    <div class="form-row">
      <label>Your Name</label>
      <input type="text" id="matchName" placeholder="Enter your name" maxlength="20">
    </div>
    <div class="form-row">
      <label>Players</label>
      <div class="seg" id="matchPlayersSeg">
        <button class="seg-btn active" data-val="2">2 Players</button>
        <button class="seg-btn" data-val="4">4 Players</button>
      </div>
    </div>
    <div class="form-row">
      <label>Dice Mode</label>
      <div class="seg" id="matchDiceSeg">
        <button class="seg-btn active" data-val="false">🎲 Normal</button>
        <button class="seg-btn" data-val="true">🎲🎲 Twin</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="Game.findMatch()">Find Match</button>
  </div>
</div>

<!-- ══ WAIT / LOBBY ═════════════════════════════════════ -->
<div id="waitScreen" class="screen">
  <div class="room-code-card">
    <div class="room-code" id="displayCode">------</div>
    <div class="room-code-label">Room Code — Share with friends</div>
    <button class="btn btn-ghost" id="copyCodeBtn" style="margin-top:8px">📋 Copy Code</button>
  </div>
  <div class="mode-pill" id="modePill">🎲 Normal · 4 players</div>
  <div class="player-slots" id="waitPlayerList"></div>
  <button class="btn btn-primary" id="readyBtn">I'm Ready</button>
  <p style="text-align:center;color:var(--muted);font-size:0.82rem">
    Game starts when all players are ready
  </p>
</div>

<!-- ══ GAME ═════════════════════════════════════════════ -->
<div id="gameScreen" class="screen">

  <!-- Top bar -->
  <div class="game-topbar">
    <div class="turn-badge">
      <div class="turn-color-dot" id="turnDot"></div>
      <span id="turnLabel">Waiting...</span>
    </div>
    <div class="mode-tag" id="diceModeBadge">🎲 Normal</div>
  </div>

  <!-- Score strip -->
  <div class="score-strip" id="scoreStrip"></div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="ludo-board" id="ludoBoard"></div>
  </div>

  <!-- Dice panel -->
  <div class="dice-panel">
    <div class="dice-row">
      <div class="dice-area" id="diceArea">
        <div class="die"><span>🎲</span></div>
      </div>
      <button class="btn btn-primary roll-btn hidden" id="rollBtn">Roll</button>
      <div class="status-msg hidden" id="statusMsg">Waiting...</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-section">
    <div class="chat-area" id="chatArea"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Say something..." maxlength="100">
      <button class="chat-send-btn" id="chatSendBtn">➤</button>
    </div>
  </div>

</div>

<!-- ══ DIE CHOOSER MODAL ════════════════════════════════ -->
<div class="modal-backdrop" id="dieModal">
  <div class="modal-sheet">
    <h3>Which die to use?</h3>
    <div class="die-choices" id="dieChoices"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="cancelDieBtn">Cancel</button>
      <button class="btn btn-primary" id="confirmDieBtn">Use This Die</button>
    </div>
  </div>
</div>

<!-- ══ WIN OVERLAY ══════════════════════════════════════ -->
<div id="winOverlay">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <h2 id="winTitle">Winner!</h2>
    <p id="winSub"></p>
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

<!-- ══ NOTIFICATIONS ════════════════════════════════════ -->
<div id="toast"></div>
<div id="notif"></div>

<!-- ══ SCRIPTS ══════════════════════════════════════════ -->
<script src="/static/js/ws.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/board.js"></script>
<script src="/static/js/game.js"></script>
<script>
  // Boot
  Game.init();

  // Fetch and display version
  fetch('/pom.properties')
    .then(r => r.text())
    .then(text => {
      const match = text.match(/version=(.+)/);
      if (match) {
        document.getElementById('appVersion').textContent = 'v' + match[1].trim();
      }
    })
    .catch(err => console.warn('Could not load version:', err));
</script>

</body>
</html>
